name: secret-scan

# Blocks secrets from entering the repo. Scans the working tree (--no-git) so it catches
# new secrets in a PR; allowlisted paths/regexes cover test fixtures and templates.
on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  gitleaks:
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Install gitleaks
        run: |
          VER=8.18.4
          curl -sSfL "https://github.com/gitleaks/gitleaks/releases/download/v${VER}/gitleaks_${VER}_linux_x64.tar.gz" \
            | tar -xz gitleaks
          sudo install gitleaks /usr/local/bin/gitleaks
          gitleaks version

      - name: Scan working tree for secrets
        run: |
          gitleaks detect \
            --no-git \
            --source . \
            --config .gitleaks.toml \
            --redact \
            --no-banner \
            --verbose
